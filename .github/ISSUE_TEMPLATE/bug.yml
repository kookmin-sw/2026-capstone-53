name: 🐛 버그 리포트
description: 버그를 발견했을 때
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 구체적으로 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 원래 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 발생 환경
      options:
        - Frontend (데스크탑)
        - Frontend (모바일 웹)
        - Backend
        - 외부 API 연동 (버스 API 등)
        - Infra / 배포
        - 기타
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 / 로그
      description: 관련 스크린샷이나 에러 로그가 있다면 첨부해주세요.

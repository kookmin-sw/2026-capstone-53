name: ✨ 기능 개발
description: 새로운 기능 구현을 위한 이슈
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      description: 어떤 기능인지 1~2줄로 설명해주세요.
      placeholder: 예) 사용자가 출발지-도착지를 입력하면 버스 경로를 추천받을 수 있다.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 배경 / 관련 모듈
      description: 이벤트 스토밍에서 어떤 바운디드 컨텍스트에 해당하는지, 관련 API가 있다면 함께 적어주세요.
      placeholder: |
        - 관련 모듈: 경로 추천
        - 관련 API: POST /api/routes/search
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건 (Acceptance Criteria)
      description: 이 기능이 "끝났다"고 판단할 기준을 체크리스트로 적어주세요.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 테스트 코드 작성
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - Frontend
        - Backend
        - Infra / AWS
        - 공통 / 기타
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 스크린샷, 관련 링크, 블로커 등 자유롭게 적어주세요.

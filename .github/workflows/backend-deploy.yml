name: Backend Deploy

# 학교 계정 EC2에 설치된 self-hosted runner에서 실행됨.
# Access Key 발급 불가 정책을 침해하지 않음:
# - runner는 EC2 내부에서 작업을 pull
# - 자격증명이 EC2 밖으로 나가지 않음
# - GHCR 인증은 GITHUB_TOKEN(워크플로우 실행 단위 임시 토큰) 사용
#
# 트리거: backend-ci.yml의 image-push 잡이 성공한 직후 자동 실행.

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  CONTAINER_NAME: busreminder-backend

jobs:
  deploy:
    name: Deploy to EC2
    # CI가 성공했고, main 브랜치 이벤트일 때만 실행
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, busreminder-ec2]
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop & remove existing container
        run: |
          if [ "$(docker ps -aq -f name=^/${{ env.CONTAINER_NAME }}$)" ]; then
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
          fi

      - name: Run new container
        # JVM 힙 512MB 제약 (t3.small 메모리 보호)
        # 환경변수는 EC2의 /etc/busreminder/app.env 에서 주입
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart unless-stopped \
            -p 8080:8080 \
            --env-file /etc/busreminder/app.env \
            -e JAVA_OPTS="-Xms256m -Xmx512m" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Health check
        # 부팅 시간 고려: 최대 60초간 5초 간격으로 폴링
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "⏳ Waiting for backend... ($i/12)"
            sleep 5
          done
          echo "❌ Health check failed"
          docker logs --tail 100 ${{ env.CONTAINER_NAME }}
          exit 1

      - name: Cleanup old images
        # 디스크 공간 확보 (latest, 직전 sha- 태그 외 제거)
        if: always()
        run: docker image prune -f

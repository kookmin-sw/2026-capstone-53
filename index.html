<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘어디</title>
  <meta name="description" content="프로젝트 소개 페이지를 준비 중입니다.">
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #586575;
      --line: #d9e0e8;
      --accent: #1f7a64;
      --accent-strong: #135947;
      --surface: #f7f9fb;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--surface);
      line-height: 1.6;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    .page {
      width: min(920px, 100%);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 5vw, 56px);
      box-shadow: 0 18px 45px rgba(23, 32, 42, 0.08);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 620px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2.5vw, 21px);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--white);
      font-weight: 700;
      text-decoration: none;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 42px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .meta div {
      min-height: 88px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .meta strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .meta span {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-labelledby="page-title">
      <p class="eyebrow">2026 Capstone Design</p>
      <h1 id="page-title">오늘어디</h1>
      <p class="lead">프로젝트 소개 페이지를 준비 중입니다. 서비스 소개와 시연 자료는 추후 업데이트됩니다.</p>

      <div class="actions" aria-label="관련 링크">
        <a class="button" href="https://github.com/kookmin-sw/2026-capstone-53">GitHub 보기</a>
      </div>

      <div class="meta" aria-label="페이지 상태">
        <div>
          <strong>소개</strong>
          <span>준비 중</span>
        </div>
        <div>
          <strong>시연</strong>
          <span>준비 중</span>
        </div>
        <div>
          <strong>팀 정보</strong>
          <span>준비 중</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

spring:
  application:
    name: todayway-backend
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false   # ISO 8601 문자열 직렬화
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:routine_commute}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&sslMode=${DB_SSL_MODE:PREFERRED}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful   # in-flight 요청 처리 후 종료

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: 30
  refresh-token-expiration-days: 14
  issuer: todayway

odsay:
  api-key: ${ODSAY_API_KEY:}
  base-url: https://api.odsay.com/v1/api
  timeout-seconds: 5
  cache-ttl-minutes: 10   # 명세 §6.1 — schedule.route_summary_json 캐시 TTL

kakao-local:
  api-key: ${KAKAO_LOCAL_API_KEY:}
  base-url: https://dapi.kakao.com/v2/local
  timeout-seconds: 5

tmap:                                            # 명세 §6.1 v1.1.21 — WALK 인도 곡선 제공자
  app-key: ${TMAP_APP_KEY:}
  base-url: https://apis.openapi.sk.com/tmap
  timeout-seconds: 5

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  # RFC 8292 §2.1 — 일부 push provider 가 placeholder mailto 일 때 401 반환.
  # 운영 EC2 는 반드시 실 메일로 override (.env / app.env 의 VAPID_SUBJECT 참고).
  subject: ${VAPID_SUBJECT:mailto:contact@todayway.example}

push:
  scheduler:
    enabled: ${PUSH_SCHEDULER_ENABLED:true}                                 # 테스트/dev에서 false 로 끔
    fixed-delay-ms: ${PUSH_SCHEDULER_FIXED_DELAY_MS:30000}                  # 명세 §9.1 — 30초 주기
    window-minutes: ${PUSH_SCHEDULER_WINDOW_MINUTES:5}                      # 명세 §9.1 — 누락 방지 윈도우
    odsay-max-attempts: ${PUSH_SCHEDULER_ODSAY_MAX_ATTEMPTS:2}              # 명세 §9.1 — 최대 2회 시도
    odsay-retry-interval-ms: ${PUSH_SCHEDULER_ODSAY_RETRY_INTERVAL_MS:1000} # 명세 §9.1 — 1초 간격

map:                                            # 명세 §4.2 GET /map/config 정적 응답
  provider: ${MAP_PROVIDER:NAVER}
  default-zoom: ${MAP_DEFAULT_ZOOM:15}
  default-center:
    lat: ${MAP_DEFAULT_CENTER_LAT:37.5665}     # 서울시청 (명세 예시 디폴트)
    lng: ${MAP_DEFAULT_CENTER_LNG:126.9780}
  tile-style: ${MAP_TILE_STYLE:basic}

geocode:
  cleanup:
    enabled: ${GEOCODE_CLEANUP_ENABLED:true}
    cron: ${GEOCODE_CLEANUP_CRON:0 0 4 * * *}  # 명세 §8.1 v1.1.18 — 매일 04:00 KST TTL eviction

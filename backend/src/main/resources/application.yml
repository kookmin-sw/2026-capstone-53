spring:
  application:
    name: todayway-backend
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false   # ISO 8601 문자열 직렬화
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:routine_commute}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&sslMode=${DB_SSL_MODE:PREFERRED}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful   # in-flight 요청 처리 후 종료

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: 30
  refresh-token-expiration-days: 14
  issuer: todayway

odsay:
  api-key: ${ODSAY_API_KEY:}
  base-url: https://api.odsay.com/v1/api
  timeout-seconds: 5
  cache-ttl-minutes: 10   # 명세 §6.1 — schedule.route_summary_json 캐시 TTL

kakao-local:
  api-key: ${KAKAO_LOCAL_API_KEY:}
  base-url: https://dapi.kakao.com/v2/local
  timeout-seconds: 5

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: mailto:contact@todayway.example
